<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shield shape -->
  <path d="M32 4L8 16v16c0 14.4 10.24 27.84 24 32 13.76-4.16 24-17.6 24-32V16L32 4z" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <path d="M32 8L12 18v14c0 12.6 8.96 24.36 20 28 11.04-3.64 20-15.4 20-28V18L32 8z" fill="#1e293b"/>

  <!-- Inner glow -->
  <path d="M32 12L16 20v12c0 10.8 7.68 20.88 16 24 8.32-3.12 16-13.2 16-24V20L32 12z" fill="#0f172a"/>

  <!-- 4 specialist nodes (top ring) -->
  <circle cx="22" cy="26" r="3.5" fill="#3b82f6" opacity="0.9"/><!-- Protocol -->
  <circle cx="42" cy="26" r="3.5" fill="#8b5cf6" opacity="0.9"/><!-- Statistical -->
  <circle cx="22" cy="38" r="3.5" fill="#f59e0b" opacity="0.9"/><!-- Behavioural -->
  <circle cx="42" cy="38" r="3.5" fill="#ec4899" opacity="0.9"/><!-- Temporal -->

  <!-- Devil's advocate node -->
  <circle cx="32" cy="32" r="3" fill="#ef4444" opacity="0.85"/>

  <!-- Orchestrator node (bottom, larger) -->
  <circle cx="32" cy="47" r="4" fill="#10b981"/>

  <!-- Connection lines -->
  <line x1="22" y1="26" x2="32" y2="32" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="26" x2="32" y2="32" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="22" y1="38" x2="32" y2="32" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="38" x2="32" y2="32" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>

  <!-- Lines from specialists to orchestrator -->
  <line x1="22" y1="26" x2="32" y2="47" stroke="#3b82f6" stroke-width="0.6" opacity="0.3"/>
  <line x1="42" y1="26" x2="32" y2="47" stroke="#8b5cf6" stroke-width="0.6" opacity="0.3"/>
  <line x1="22" y1="38" x2="32" y2="47" stroke="#f59e0b" stroke-width="0.6" opacity="0.3"/>
  <line x1="42" y1="38" x2="32" y2="47" stroke="#ec4899" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="32" x2="32" y2="47" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>

  <!-- Cross connections between specialists -->
  <line x1="22" y1="26" x2="42" y2="26" stroke="#475569" stroke-width="0.4" opacity="0.25"/>
  <line x1="22" y1="38" x2="42" y2="38" stroke="#475569" stroke-width="0.4" opacity="0.25"/>
  <line x1="22" y1="26" x2="22" y2="38" stroke="#475569" stroke-width="0.4" opacity="0.25"/>
  <line x1="42" y1="26" x2="42" y2="38" stroke="#475569" stroke-width="0.4" opacity="0.25"/>

  <!-- Small bright dots on nodes for glow effect -->
  <circle cx="32" cy="47" r="1.5" fill="#34d399"/>
  <circle cx="32" cy="32" r="1.2" fill="#f87171"/>
</svg>
